<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🚀 Завантажити програму</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(-45deg,#020024,#090979,#000,#3a0ca3);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.box{
    width:400px;
    padding:30px;
    text-align:center;
    background:rgba(0,0,0,0.75);
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
}

h1{
    margin-bottom:15px;
}

p{
    margin-bottom:20px;
    color:#ddd;
}

.button{
    display:inline-block;
    padding:14px 24px;
    background:#3a0ca3;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

.button:hover{
    background:#560bad;
    transform:scale(1.05);
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="box">
    <h1>🚀 Windows Optimizer Pro</h1>

    <p>Натисніть кнопку нижче, щоб завантажити програму.</p>

    <a class="button" href="optimizer_pro.exe" download>
        ⬇ Скачати програму
    </a>

    <div class="footer">
        Версія 1.0
    </div>
</div>

</body>
</html>
